[workspace]
name = "pydiceplot"
version = "1.0.0"
description = "Dice plots for high-dimensional categorical data"
channels = ["conda-forge"]
platforms = ["osx-arm64"]

[dependencies]
python = ">=3.10"
pandas = ">=1.5"
numpy = ">=1.23"
matplotlib = ">=3.7"
plotly = ">=5.15"
scipy = ">=1.10"
python-kaleido = "*"
pytest = "*"
python-build = "*"
twine = "*"

[pypi-dependencies]
pydiceplot = { path = ".", editable = true }

[tasks]
test = "pytest tests -v"
example = "python -m example_code.example"
build = { cmd = "rm -rf dist build *.egg-info && python -m build", description = "Build sdist + wheel" }
check = { cmd = "python -m twine check dist/*", description = "Validate built artifacts" }
