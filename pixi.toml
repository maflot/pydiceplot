[workspace]
name = "pydiceplot"
version = "0.0.3"
description = "Plot multidimensional categorical data"
channels = ["conda-forge"]
platforms = ["osx-arm64"]

[dependencies]
python = ">=3.10"
pandas = ">=1.5"
numpy = ">=1.23"
matplotlib = ">=3.7"
plotly = ">=5.15"
scipy = ">=1.10"
python-kaleido = "*"
pytest = "*"

[pypi-dependencies]
pydiceplot = { path = ".", editable = true }

[tasks]
test = "pytest tests -v"
example = "python -m example_code.example"
